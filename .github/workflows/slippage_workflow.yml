name: Morning Slippage

on:
  schedule:
    - cron: '0 15 * * 2-6'
  workflow_dispatch:

jobs:
  record-opens:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install yfinance pandas

      - name: Record open prices and slippage
        run: python record_slippage.py

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trades.json docs/trades.json slippage_log.json
          git diff --staged --quiet && exit 0
          git commit -m "slippage $(date -u +'%Y-%m-%d')"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main
            git push origin main && exit 0
            echo "Push failed, retry $i/5..."
            sleep 5
          done
          exit 1
