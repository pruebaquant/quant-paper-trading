name: Morning Slippage

on:
  schedule:
    # 15:00 UTC = 10:00 ET — 30 min after market open
    - cron: '0 15 * * 2-6'
  workflow_dispatch:

jobs:
  record-opens:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install yfinance pandas

      - name: Record open prices and slippage
        run: python record_slippage.py

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trades.json docs/trades.json slippage_log.json
          git diff --staged --quiet || git commit -m "slippage $(date -u +'%Y-%m-%d')"
          git push
