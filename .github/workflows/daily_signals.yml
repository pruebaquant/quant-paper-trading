name: Daily Signals

on:
  schedule:
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

jobs:
  generate-signals:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance lxml pandas numpy xgboost scikit-learn

      - name: Generate signals, close trades, send email
        run: python daily_signals.py
        env:
          PYTHONPATH: ${{ github.workspace }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add trades.json docs/trades.json slippage_log.json
          git diff --staged --quiet || git commit -m "slippage $(date -u +'%Y-%m-%d')"
          git push
